    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
}

.ai-msg.user {
    background: linear-gradient(135deg, #7B9FD4, #A89FD4);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.ai-msg.assistant {
    background: white;
    color: #333;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

#ai-input-area {
    padding: 12px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
    background: white;
}

#ai-input {
    flex: 1;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    resize: none;
    outline: none;
    font-family: Arial, sans-serif;
}

#ai-input:focus { border-color: #A89FD4; }

#ai-send {
    background: linear-gradient(135deg, #7B9FD4, #A89FD4);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
}

#ai-send:hover { opacity: 0.9; }
#ai-send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<script>
const API_URL = "https://ai-assistant-production-fc85.up.railway.app/chat";
const SYSTEM_PROMPT = `你是王嘉琦个人技术博客的 AI 助手，性格活泼友好，回答简洁可爱。

关于这个博客：
- 博主：计算机科学与技术专业本科毕业
- 博客地址：gravity2000.github.io
- 主要内容：技术项目开发记录、游戏攻略、Steam 闪卡收集

技术项目：
- Steam 冷门闪卡价格监控系统：Python + FastAPI，监控价格低于期望值时邮件提醒
- 待办事项 REST API：Python + FastAPI + SQLite
- 本博客：Hugo + GitHub Pages，集成 AI 助手

博主技术栈：Python、FastAPI、SQLAlchemy、PostgreSQL、JWT、Railway 部署

如果被问到博客没有的内容，你可以调用你的模型解答。请不要透露博主的真名等个人信息`;

let messages = [{ role: "system", content: SYSTEM_PROMPT }];
let isOpen = false;
let isDragging = false;
let dragStartX, dragStartY, petStartX, petStartY;

const container = document.getElementById("ai-pet-container");
const pet = document.getElementById("ai-pet");
const chat = document.getElementById("ai-chat");


pet.addEventListener("mousedown", (e) => {
    isDragging = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const rect = container.getBoundingClientRect();
    petStartX = window.innerWidth - rect.right;
    petStartY = window.innerHeight - rect.bottom;

    const onMove = (e) => {
        const dx = Math.abs(e.clientX - dragStartX);
        const dy = Math.abs(e.clientY - dragStartY);
        if (dx > 5 || dy > 5) isDragging = true;
        if (isDragging) {
            const newRight = petStartX - (e.clientX - dragStartX);
            const newBottom = petStartY - (e.clientY - dragStartY);
            container.style.right = Math.max(0, newRight) + "px";
            container.style.bottom = Math.max(0, newBottom) + "px";
        }
    };

    const onUp = () => {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        if (!isDragging) toggleChat();
    };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
});

function toggleChat() {
    isOpen = !isOpen;
    chat.style.display = isOpen ? "flex" : "none";
    if (isOpen && messages.length === 1) {
        addMessage("assistant", "你好呀～我是这个博客的 AI 助手！有什么可以帮你的吗？✨");
    }
}

function closeChat() {
    isOpen = false;
    chat.style.display = "none";
}

function addMessage(role, content) {
    const messagesDiv = document.getElementById("ai-messages");
    const msg = document.createElement("div");
    msg.className = `ai-msg ${role}`;
    msg.textContent = content;
    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return msg;
}

async function sendMessage() {
    const input = document.getElementById("ai-input");
    const sendBtn = document.getElementById("ai-send");
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = "";
    sendBtn.disabled = true;

    addMessage("user", text);
    messages.push({ role: "user", content: text });

    if (messages.length > 11) {
        messages = [messages[0], ...messages.slice(-10)];
    }

    const thinkingMsg = addMessage("assistant", "思考中...");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: messages})
        });
        const data = await response.json();
        const reply = data.choices[0].message.content;
        thinkingMsg.textContent = reply;
        messages.push({ role: "assistant", content: reply });
    } catch (e) {
        thinkingMsg.textContent = "连接失败，请稍后再试 😢";
    }

    sendBtn.disabled = false;
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("ai-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
});
</script></body>
</html>
